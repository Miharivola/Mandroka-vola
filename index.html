<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mandroka Vola v7.5</title>
    <style>
        :root { --bg-dark: #080a0e; --card-bg: #12161d; --accent-orange: #f39c12; --text-gray: #6e7681; --input-bg: #1c2128; }
        body { background-color: var(--bg-dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        .app-container { width: 100%; max-width: 420px; padding: 20px; box-sizing: border-box; position: relative; }
        
        /* LERA VELONA (CLOCK) */
        .live-clock {
            position: absolute; top: 15px; left: 15px; background: rgba(255, 255, 255, 0.1);
            padding: 8px 12px; border-radius: 10px; border: 1px solid rgba(255, 255, 255, 0.2);
            font-family: monospace; font-size: 1rem; color: white; display: flex; align-items: center; gap: 8px;
            backdrop-filter: blur(5px); z-index: 100;
        }

        .page { display: none; animation: fadeIn 0.4s ease; }
        #inputPage { display: block; }
        .header-main { text-align: center; margin: 40px 0 20px 0; }
        .input-card { background: var(--card-bg); padding: 30px 20px; border-radius: 25px; border: 1px solid #222; text-align: center; }
        .time-inputs { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin: 15px 0 20px 0; }
        input { width: 100%; padding: 15px; background: var(--input-bg); border: 1px solid #333; border-radius: 12px; color: var(--accent-orange); font-size: 1.2rem; font-weight: bold; text-align: center; box-sizing: border-box; outline: none; }
        
        /* RESULT DESIGN */
        .res-title { color: var(--accent-orange); font-weight: 900; font-size: 1.5rem; text-align: center; margin: 30px 0 5px 0; text-transform: uppercase; }
        .main-circle { width: 190px; height: 190px; border: 2px solid #332111; border-radius: 50%; display: flex; flex-direction: column; justify-content: center; align-items: center; margin: 0 auto 25px auto; position: relative; background: radial-gradient(circle, rgba(243, 156, 18, 0.05) 0%, transparent 80%); }
        .main-circle::after { content: ''; position: absolute; top: -3px; left: -3px; right: -3px; bottom: -3px; border: 2px solid var(--accent-orange); border-radius: 50%; clip-path: polygon(0 0, 100% 0, 100% 35%, 0 35%); }
        .main-val { font-size: 2.5rem; color: var(--accent-orange); font-weight: bold; }
        
        .tours-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .tours-grid-bottom { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 40px; margin-bottom: 15px; }
        .tour-card { background: rgba(18, 22, 29, 0.8); padding: 12px 5px; border-radius: 15px; border: 1px solid #222; text-align: center; }
        .tour-time { font-size: 0.75rem; color: white; margin-bottom: 4px; font-family: monospace; }
        .tour-val { font-size: 1rem; color: var(--accent-orange); font-weight: bold; }

        .btn-predict { background: linear-gradient(135deg, #f39c12, #e67e22); border: none; padding: 18px; border-radius: 15px; color: white; font-weight: bold; width: 100%; cursor: pointer; margin-top: 20px; }
        .btn-back { background: transparent; border: 1px solid #333; color: var(--text-gray); padding: 10px; border-radius: 12px; width: 100%; margin-top: 15px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="live-clock" id="liveClock">🕒 00:00:00</div>

<div class="app-container">
    <div id="inputPage" class="page">
        <div class="header-main">
            <h1 style="color:var(--accent-orange); margin:0;">MANDROKA VOLA</h1>
            <p style="font-size:0.7rem; color:var(--text-gray);">Analyse IA Premium</p>
        </div>
        <div class="input-card">
            <label style="font-size: 0.7rem; color: var(--text-gray);">🕒 ORA FIANOMBOHANA (Lera ankehitriny)</label>
            <div class="time-inputs"><input type="number" id="h"><input type="number" id="m"><input type="number" id="s"></div>
            <label style="font-size: 0.7rem; color: var(--text-gray);">📈 MULTIPLICATEUR CIBLE</label>
            <input type="number" id="multC" value="10">
            <button class="btn-predict" onclick="runCalculation()">🚀 PRÉDIRE</button>
        </div>
    </div>

    <div id="resultPage" class="page">
        <div class="res-title">RÉSULTAT DE PRÉDICTION 🎯</div>
        <div class="main-circle">
            <div style="font-size:0.6rem; color:var(--text-gray);">Cote principale</div>
            <div class="main-val" id="resMain">0.00×</div>
            <div id="resMainTime" style="color:var(--accent-orange); font-size:0.8rem;">00:00:00</div>
        </div>
        
        <div style="color: var(--accent-orange); font-size: 0.85rem; font-weight: bold; margin-bottom: 10px;">📚 Tours Prédits</div>
        <div class="tours-grid" id="tGridTop"></div>
        <div class="tours-grid-bottom" id="tGridBottom"></div>

        <button class="btn-back" onclick="goBack()">⬅️ HANAVAO ORA</button>
    </div>
</div>

<script>
    // 1. UPDATE LIVE CLOCK
    function updateLiveTime() {
        const now = new Date();
        const timeStr = "🕒 " + 
            String(now.getHours()).padStart(2, '0') + ":" + 
            String(now.getMinutes()).padStart(2, '0') + ":" + 
            String(now.getSeconds()).padStart(2, '0');
        document.getElementById('liveClock').innerText = timeStr;
    }
    setInterval(updateLiveTime, 1000);
    updateLiveTime();

    window.onload = function() {
        const now = new Date();
        document.getElementById('h').value = now.getHours();
        document.getElementById('m').value = now.getMinutes();
        document.getElementById('s').value = now.getSeconds();
    }

    function addTime(h, m, s, minAdd, secAdd) {
        let d = new Date();
        d.setHours(h, m, s);
        d.setMinutes(d.getMinutes() + minAdd);
        d.setSeconds(d.getSeconds() + secAdd);
        return String(d.getHours()).padStart(2, '0') + ":" + String(d.getMinutes()).padStart(2, '0') + ":" + String(d.getSeconds()).padStart(2, '0');
    }

    function runCalculation() {
        const h = parseInt(document.getElementById('h').value) || 0;
        const m = parseInt(document.getElementById('m').value) || 0;
        const s = parseInt(document.getElementById('s').value) || 0;
        const target = parseFloat(document.getElementById('multC').value) || 10;

        document.getElementById('resMain').innerText = target.toFixed(2) + "×";
        document.getElementById('resMainTime').innerText = addTime(h, m, s, 5, 0);

        let topHtml = "";
        for(let i=1; i<=3; i++) {
            let lera = addTime(h, m, s, 2 + i, Math.floor(Math.random()*59));
            let val = (target + (Math.random()*12)).toFixed(2);
            topHtml += `<div class="tour-card"><div style="font-size:0.5rem; color:var(--text-gray);">Tour ${i}</div><div class="tour-time">${lera}</div><div class="tour-val">${val}×</div></div>`;
        }
        document.getElementById('tGridTop').innerHTML = topHtml;

        let botHtml = "";
        for(let i=4; i<=5; i++) {
            let lera = addTime(h, m, s, 7 + i, Math.floor(Math.random()*59));
            let val = (i === 5) ? (Math.random()*50 + 40).toFixed(2) : (Math.random()*5 + 1.5).toFixed(2);
            botHtml += `<div class="tour-card"><div style="font-size:0.5rem; color:var(--text-gray);">Tour ${i}</div><div class="tour-time">${lera}</div><div class="tour-val">${val}×</div></div>`;
        }
        document.getElementById('tGridBottom').innerHTML = botHtml;

        document.getElementById('inputPage').style.display = 'none';
        document.getElementById('resultPage').style.display = 'block';
        if (navigator.vibrate) navigator.vibrate(80);
    }

    function goBack() {
        document.getElementById('inputPage').style.display = 'block';
        document.getElementById('resultPage').style.display = 'none';
    }
</script>
</body>
</html>
