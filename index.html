<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mandroka Vola v2.2</title>
    <style>
        :root {
            --bg-color: #0b0e14;
            --card-color: #1a1d23;
            --accent-orange: linear-gradient(135deg, #ff4500, #ffa500);
            --input-bg: #252a33;
        }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .app-container { width: 90%; max-width: 360px; text-align: center; }

        h1 { color: #ff8c00; text-transform: uppercase; font-size: 1.4rem; margin-bottom: 5px; }

        .main-card {
            background-color: var(--card-color);
            border-radius: 25px;
            padding: 25px;
            border: 1px solid #333;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }

        .input-group { margin-bottom: 20px; text-align: left; }

        label { color: #8b949e; font-size: 0.8rem; display: block; margin-bottom: 8px; font-weight: bold; }

        input {
            width: 100%;
            padding: 15px;
            background: var(--input-bg);
            border: 1px solid #3d4451;
            border-radius: 12px;
            color: white;
            font-size: 1.1rem;
            box-sizing: border-box;
            outline: none;
        }

        input:focus { border-color: #ff8c00; }

        .result-box {
            background: rgba(255, 140, 0, 0.1);
            border: 2px dashed #ff8c00;
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
            display: none; /* Afatotra rehefa misy vokatra */
        }

        .result-val { font-size: 2.5rem; color: #ffcc00; font-weight: bold; display: block; }

        .predict-btn {
            background: var(--accent-orange);
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 20px;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 5px 15px rgba(255, 69, 0, 0.4);
        }
    </style>
</head>
<body>

<div class="app-container">
    <h1>MANDROKA VOLA 💰</h1>
    
    <div class="main-card">
        <div class="input-group">
            <label>🕒 HEURE DU DÉPART (HH:MM:SS)</label>
            <input type="time" id="startTime" step="1" value="17:03:00">
        </div>

        <div class="input-group">
            <label>📈 MULTIPLICATEUR CIBLE (MIN 10x)</label>
            <input type="number" id="targetMult" placeholder="Ohatra: 10" min="10">
        </div>

        <div id="resultCard" class="result-box">
            <span style="font-size: 0.8rem; color: #aaa;">VINANY MANARAKA:</span>
            <span class="result-val" id="predictionText">0.00x</span>
        </div>

        <button class="predict-btn" onclick="calculateMandroka()">✨ PRÉDIRE</button>
    </div>
</div>

<script>
    function calculateMandroka() {
        const startTime = document.getElementById('startTime').value;
        const targetMult = parseFloat(document.getElementById('targetMult').value);

        if (!startTime || isNaN(targetMult)) {
            alert("Mba fenoy tsara ny ora sy ny multiplicateur (10 miakatra)!");
            return;
        }

        // Vibration ho an'ny finday
        if (navigator.vibrate) navigator.vibrate(70);

        // Algorithm kely mampifandray ny Ora sy ny Multiplicateur
        // Eto ianao dia afaka manisy "logic" manokana
        const timeParts = startTime.split(':');
        const seed = parseInt(timeParts[0]) + parseInt(timeParts[1]) + parseInt(timeParts[2]);
        
        // Mamorona isa vinany mifanakaiky amin'ilay target fa misy kisendrasendra kely
        let noise = (Math.random() * 5); // Miampy na mihena kely
        let result = (targetMult + noise).toFixed(2);

        // Mampiseho ny valiny
        const resultCard = document.getElementById('resultCard');
        const predictionText = document.getElementById('predictionText');
        
        predictionText.innerText = result + "x";
        resultCard.style.display = "block";
        
        // Animation kely
        resultCard.style.animation = "none";
        setTimeout(() => { resultCard.style.animation = "flash 0.5s ease"; }, 10);
    }
</script>

</body>
</html>
