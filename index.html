<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mamiratra Falahidy v2.0</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-color: #161b22;
            --accent-orange: linear-gradient(90deg, #ff8c00, #ffcc33);
            --text-gray: #8b949e;
        }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .app-container {
            width: 350px;
            text-align: center;
        }

        h1 {
            color: #ff8c00;
            text-transform: uppercase;
            font-size: 1.2rem;
            letter-spacing: 2px;
        }

        .version {
            background: #21262d;
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 0.7rem;
            color: var(--text-gray);
        }

        .main-card {
            background-color: var(--card-color);
            border-radius: 20px;
            padding: 30px 20px;
            margin-top: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .label {
            color: var(--text-gray);
            font-size: 0.9rem;
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
        }

        .time-grid {
            display: grid;
            grid-template-columns: 1fr auto 1fr auto 1fr;
            gap: 10px;
            align-items: center;
            margin-bottom: 30px;
        }

        .time-box {
            background: #21262d;
            border-radius: 10px;
            padding: 15px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #ccc;
        }

        .separator { color: #ff8c00; font-weight: bold; }

        .multiplier-box {
            background: #21262d;
            border-radius: 10px;
            padding: 20px;
            font-size: 1.8rem;
            font-weight: bold;
            color: #ccc;
            margin: 10px 0 30px 0;
            position: relative;
        }

        .predict-btn {
            background: var(--accent-orange);
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 15px;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            text-transform: uppercase;
            transition: transform 0.2s;
        }

        .predict-btn:active { transform: scale(0.98); }
    </style>
</head>
<body>

<div class="app-container">
    <h1>Mamiratra Falahidy <span style="display:inline-block; width:15px; height:15px; background:#ff8c00; border-radius:3px;"></span></h1>
    <span class="version">v2.0</span>

    <div class="main-card">
        <div class="label">🕒 Heure · Minute · Seconde</div>
        <div class="time-grid">
            <div class="time-box" id="h">00</div>
            <div class="separator">:</div>
            <div class="time-box" id="m">00</div>
            <div class="separator">:</div>
            <div class="time-box" id="s">00</div>
        </div>

        <div class="label">📈 Multiplicateur</div>
        <div class="multiplier-box">
            <span id="mult">--</span> <span style="font-size: 1rem; color: #555;">x</span>
        </div>

        <button class="predict-btn" onclick="generatePrediction()">✨ Prédire</button>
    </div>
</div>

<script>
    // Logic an'ilay faminaniana (Prediction)
    function generatePrediction() {
        const now = new Date();
        
        // Alaina ny fotoana ankehitriny
        document.getElementById('h').innerText = String(now.getHours()).padStart(2, '0');
        document.getElementById('m').innerText = String(now.getMinutes()).padStart(2, '0');
        document.getElementById('s').innerText = String(now.getSeconds()).padStart(2, '0');

        // Alaina ny Multiplicateur (Random ohatra)
        // Azonao ovaina eto ny "chance" hivoahan'ny isa
        const randomMult = (Math.random() * 15 + 1).toFixed(2);
        document.getElementById('mult').innerText = randomMult;

        alert("Faminany vaovao azo!");
    }
</script>

</body>
</html>
