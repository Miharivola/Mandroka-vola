<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mandroka Vola v4.2</title>
    <style>
        :root {
            --bg-dark: #080a0e;
            --card-bg: #12161d;
            --accent-orange: #f39c12;
            --text-gray: #6e7681;
            --input-bg: #1c2128;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .app-container { width: 100%; max-width: 420px; padding: 20px; box-sizing: border-box; }
        .header-title { text-align: center; font-size: 1.8rem; color: var(--accent-orange); font-weight: 900; margin-bottom: 25px; text-transform: uppercase; }

        .page { display: none; animation: fadeIn 0.4s ease; }
        #inputPage { display: block; }

        .input-card { background: var(--card-bg); padding: 30px 20px; border-radius: 25px; border: 1px solid #222; text-align: center; }
        .time-inputs { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin: 15px 0 25px 0; }
        
        input {
            width: 100%; padding: 15px; background: var(--input-bg); border: 1px solid #333;
            border-radius: 12px; color: var(--accent-orange); font-size: 1.2rem; font-weight: bold;
            text-align: center; box-sizing: border-box; outline: none;
        }

        .main-circle {
            width: 220px; height: 220px; border: 4px solid #332111; border-radius: 50%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            margin: 0 auto 30px auto; position: relative;
            background: radial-gradient(circle, rgba(243, 156, 18, 0.1) 0%, transparent 75%);
        }
        .main-circle::after {
            content: ''; position: absolute; top: -5px; left: -5px; right: -5px; bottom: -5px;
            border: 2px solid var(--accent-orange); border-radius: 50%;
            clip-path: polygon(0 0, 100% 0, 100% 30%, 0 30%);
        }
        .main-val { font-size: 2.8rem; color: var(--accent-orange); font-weight: bold; }
        
        .tours-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .tour-card { background: var(--card-bg); padding: 15px; border-radius: 18px; border: 1px solid #222; text-align: center; }

        /* VINANY AMBANY (Tours prédits) */
        .mini-list { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 15px 0 25px 0; }
        .mini-card { background: #161b22; padding: 12px 5px; border-radius: 10px; border-bottom: 3px solid var(--accent-orange); text-align: center; }

        .hist-item {
            background: var(--card-bg); padding: 15px; border-radius: 15px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--accent-orange);
        }

        .btn-predict {
            background: linear-gradient(135deg, #f39c12, #e67e22); border: none; padding: 20px;
            border-radius: 15px; color: white; font-weight: bold; font-size: 1.1rem; width: 100%; cursor: pointer;
        }
        .btn-nav { background: transparent; border: 1px solid #333; color: var(--text-gray); padding: 12px; border-radius: 12px; width: 100%; margin-top: 15px; cursor: pointer; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header-title">MANDROKA VOLA</div>

    <div id="inputPage" class="page">
        <div class="input-card">
            <label>🕒 ORA FIANOMBOHANA (H:M:S)</label>
            <div class="time-inputs">
                <input type="number" id="h" placeholder="Ora">
                <input type="number" id="m" placeholder="Min">
                <input type="number" id="s" placeholder="Seg">
            </div>
            <label>📈 MULTIPLICATEUR CIBLE</label>
            <input type="number" id="multC" value="10">
            <button class="btn-predict" style="margin-top:20px" onclick="runCalculation()">🚀 PRÉDIRE</button>
            <button class="btn-nav" onclick="showPage('histPage')">📜 HISTORIQUE</button>
        </div>
    </div>

    <div id="resultPage" class="page">
        <div class="main-circle">
            <div style="font-size: 0.7rem; color: var(--text-gray);">Côte prédite</div>
            <div class="main-val" id="resMain">×0.00</div>
            <div id="resSub" style="color: #8e6d45; font-weight: bold;">×0.00</div>
            <div id="resTime" style="font-size: 0.8rem; color: var(--text-gray);">00:00:00</div>
        </div>
        <div class="tours-grid">
            <div class="tour-card">
                <div style="font-size: 0.7rem; color: var(--accent-orange);">TOUR 1</div>
                <div id="t1Time" style="font-size: 0.8rem; color: var(--text-gray);">00:00:00</div>
                <div id="t1Val" style="font-size: 1.2rem; font-weight: bold; color: #d38c36;">×0.00</div>
            </div>
            <div class="tour-card">
                <div style="font-size: 0.7rem; color: var(--accent-orange);">TOUR 2</div>
                <div id="t2Time" style="font-size: 0.8rem; color: var(--text-gray);">00:00:00</div>
                <div id="t2Val" style="font-size: 1.2rem; font-weight: bold; color: var(--accent-orange);">×0.00</div>
            </div>
        </div>

        <div style="color: var(--accent-orange); font-size: 0.85rem; text-align: left; font-weight: bold;">⭐ Tours prédits</div>
        <div class="mini-list" id="miniList"></div>

        <button class="btn-nav" onclick="showPage('inputPage')">⬅️ HANAVAO ORA</button>
    </div>

    <div id="histPage" class="page">
        <h3 style="color: var(--accent-orange); border-bottom: 1px solid #333; padding-bottom: 10px;">VOKATRA TEOPAKELO</h3>
        <div id="histContent"></div>
        <button class="btn-nav" onclick="showPage('inputPage')">⬅️ HIVERINA</button>
    </div>
</div>

<script>
    let historyData = JSON.parse(localStorage.getItem('mandroka_history')) || [];

    window.onload = function() {
        const now = new Date();
        document.getElementById('h').value = now.getHours();
        document.getElementById('m').value = now.getMinutes();
        document.getElementById('s').value = now.getSeconds();
        updateHistoryUI();
    }

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.getElementById(pageId).style.display = 'block';
    }

    function addTime(h, m, s, addMin, addSec) {
        let d = new Date();
        d.setHours(h, m, s);
        d.setMinutes(d.getMinutes() + addMin);
        d.setSeconds(d.getSeconds() + addSec);
        return String(d.getHours()).padStart(2,'0')+":"+String(d.getMinutes()).padStart(2,'0')+":"+String(d.getSeconds()).padStart(2,'0');
    }

    function runCalculation() {
        const hh = parseInt(document.getElementById('h').value) || 0;
        const mm = parseInt(document.getElementById('m').value) || 0;
        const ss = parseInt(document.getElementById('s').value) || 0;
        const target = parseFloat(document.getElementById('multC').value) || 10;

        const mainVal = (Math.random() * (target + 15) + target).toFixed(2);
        const subVal = (Math.random() * 5 + 2).toFixed(2);
        const timeBase = String(hh).padStart(2,'0')+":"+String(mm).padStart(2,'0')+":"+String(ss).padStart(2,'0');

        document.getElementById('resMain').innerText = "×" + mainVal;
        document.getElementById('resSub').innerText = "×" + subVal;
        document.getElementById('resTime').innerText = addTime(hh,mm,ss, 3, 0);
        document.getElementById('t1Time').innerText = addTime(hh,mm,ss, 1, 0);
        document.getElementById('t1Val').innerText = "×" + subVal;
        document.getElementById('t2Time').innerText = addTime(hh,mm,ss, 3, 0);
        document.getElementById('t2Val').innerText = "×" + mainVal;

        // Famerenana ny vinany ambany (Tours prédits)
        const list = document.getElementById('miniList');
        list.innerHTML = "";
        for(let i=0; i<4; i++) {
            const v = (Math.random() * 20 + 20).toFixed(2);
            const t = addTime(hh, mm, ss, 5 + (i * 4), 0);
            list.innerHTML += `<div class="mini-card"><div style="color:var(--accent-orange); font-size:0.85rem; font-weight:bold;">×${v}</div><div style="font-size:0.55rem; color:var(--text-gray);">${t}</div></div>`;
        }

        historyData.unshift({ time: timeBase, cote: mainVal });
        if(historyData.length > 10) historyData.pop();
        localStorage.setItem('mandroka_history', JSON.stringify(historyData));
        updateHistoryUI();

        showPage('resultPage');
        if (navigator.vibrate) navigator.vibrate(70);
    }

    function updateHistoryUI() {
        const container = document.getElementById('histContent');
        container.innerHTML = historyData.length === 0 ? '<p style="text-align:center; color:var(--text-gray);">Tsy mbola misy.</p>' : 
        historyData.map(item => `<div class="hist-item"><div><div style="font-weight:bold; color:var(--accent-orange);">×${item.cote}</div></div><div style="color:var(--text-gray);">${item.time}</div></div>`).join('');
    }
</script>
</body>
</html>
